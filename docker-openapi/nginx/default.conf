# Hide nginx version in error responses & Server: header.
server_tokens off;

server {
    listen 80;

    # Cap inbound request bodies. Job submission carries small INI/JSON
    # payloads; queries themselves are uploaded to Blob Storage by the
    # client, never through this proxy. 8 MiB leaves slack for unusually
    # large config blocks while preventing trivial memory-exhaustion DoS.
    client_max_body_size 8m;

    # Reasonable timeouts so a slow client cannot hold a worker forever.
    client_body_timeout   30s;
    client_header_timeout 15s;
    send_timeout          60s;

    # Defence-in-depth response headers. The FastAPI app also sets these
    # via SecurityHeadersMiddleware; nginx ensures they survive when the
    # backend is bypassed (e.g. nginx-served error pages).
    add_header X-Content-Type-Options nosniff       always;
    add_header X-Frame-Options        DENY          always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://fastapi:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # Replace (not append) X-Forwarded-For so a malicious client
        # cannot spoof source IPs for downstream auditing.
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 5s;
    }
}
