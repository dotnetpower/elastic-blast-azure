[cloud-provider]
azure-region = koreacentral
azure-acr-resource-group = rg-elb-koc
azure-acr-name = elbacr
azure-resource-group = rg-elb-koc
azure-storage-account = stgelb
azure-storage-account-container = blast-db

[cluster]
name = elb-test-sm3
machine-type = Standard_D8s_v3
num-nodes = 1
reuse = true

[blast]
program = blastn
db = https://stgelb.blob.core.windows.net/blast-db/16S_ribosomal_RNA
queries = https://stgelb.blob.core.windows.net/queries/test_query.fa
results = https://stgelb.blob.core.windows.net/results/test-small
options = -evalue 0.01 -outfmt 7
batch-len = 10000
