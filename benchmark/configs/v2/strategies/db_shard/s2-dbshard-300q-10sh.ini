[cloud-provider]
azure-region = koreacentral
azure-acr-resource-group = rg-elbacr
azure-acr-name = elbacr
azure-resource-group = rg-elb-koc
azure-storage-account = stgelb
azure-storage-account-container = blast-db

# DB Shard Strategy: 10 shards, full query broadcast
# Each node holds ~50 GB (core_nt / 10)
# Results require merge + re-rank

[cluster]
name = elb-v2-dbshard
machine-type = Standard_E64s_v3
num-nodes = 10
exp-use-local-ssd = true

[blast]
program = blastn
db = https://stgelb.blob.core.windows.net/blast-db/core_nt_shards/core_nt_shard_00
queries = https://stgelb.blob.core.windows.net/queries/pathogen-300.fa
results = https://stgelb.blob.core.windows.net/results/v2/db_shard/s2-dbshard-300q-10sh
options = -max_target_seqs 500 -evalue 0.05 -word_size 28 -dust yes -soft_masking true -outfmt 7
batch-len = 100000
mem-limit = 4G

[strategy]
type = db_shard
num-shards = 10
db-base = https://stgelb.blob.core.windows.net/blast-db/core_nt_shards/core_nt_shard
merge = rerank
