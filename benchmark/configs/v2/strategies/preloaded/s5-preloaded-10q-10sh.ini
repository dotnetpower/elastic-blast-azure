[cloud-provider]
azure-region = koreacentral
azure-acr-resource-group = rg-elbacr
azure-acr-name = elbacr
azure-resource-group = rg-elb-koc
azure-storage-account = stgelb
azure-storage-account-container = blast-db

# Pre-loaded Strategy: 10 shards on persistent nodes
# DB pre-cached, zero cold-start for subsequent requests
# reuse = true keeps cluster alive between runs

[cluster]
name = elb-v2-preloaded
machine-type = Standard_E64s_v3
num-nodes = 10
exp-use-local-ssd = true
reuse = true

[blast]
program = blastn
db = https://stgelb.blob.core.windows.net/blast-db/core_nt_shards/core_nt_shard_00
queries = https://stgelb.blob.core.windows.net/queries/pathogen-10.fa
results = https://stgelb.blob.core.windows.net/results/v2/preloaded/s5-preloaded-10q-10sh
options = -max_target_seqs 500 -evalue 0.05 -word_size 28 -dust yes -soft_masking true -outfmt 7
batch-len = 100000
mem-limit = 4G

[strategy]
type = preloaded
num-shards = 10
merge = rerank
reuse = true
