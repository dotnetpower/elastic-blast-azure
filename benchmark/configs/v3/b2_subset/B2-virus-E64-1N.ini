[cloud-provider]
azure-region = koreacentral
azure-acr-resource-group = rg-elbacr
azure-acr-name = elbacr
azure-resource-group = rg-elb-koc
azure-storage-account = stgelb
azure-storage-account-container = blast-db

# B2-virus-E64-1N: Virus-only subset, E64s single node
# Axis B2 — Taxonomy Subset
# Uses pre-built subset DB instead of full core_nt (269 GB).
# No -dbsize correction needed: subset DB has its own statistics.

[cluster]
name = elb-v3-b2vir
machine-type = Standard_E64s_v3
num-nodes = 1
exp-use-local-ssd = true

[blast]
program = blastn
db = https://stgelb.blob.core.windows.net/blast-db/core_nt_virus/core_nt_virus
queries = https://stgelb.blob.core.windows.net/queries/pathogen-10.fa
results = https://stgelb.blob.core.windows.net/results/v3/b2_subset/B2-virus-E64-1N
options = -max_target_seqs 500 -evalue 0.05 -word_size 28 -dust yes -soft_masking true -outfmt 7
batch-len = 100000
mem-limit = 4G

[timeouts]
init-pv = 30
