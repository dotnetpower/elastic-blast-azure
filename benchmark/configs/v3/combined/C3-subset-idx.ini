[cloud-provider]
azure-region = koreacentral
azure-acr-resource-group = rg-elbacr
azure-acr-name = elbacr
azure-resource-group = rg-elb-koc
azure-storage-account = stgelb
azure-storage-account-container = blast-db

# C3-subset-idx: Pathogen subset + MegaBLAST index, E16s single node
# Combined Strategy
# NOTE: Uses custom blast-run script with -use_index.
# See: benchmark/scripts/blast-run-indexed-aks.sh

[cluster]
name = elb-v3-combined
machine-type = Standard_E16s_v3
num-nodes = 1
exp-use-local-ssd = true

[blast]
program = blastn
db = https://stgelb.blob.core.windows.net/blast-db/core_nt_pathogen_indexed/core_nt_pathogen
queries = https://stgelb.blob.core.windows.net/queries/pathogen-10.fa
results = https://stgelb.blob.core.windows.net/results/v3/combined/C3-subset-idx
options = -max_target_seqs 500 -evalue 0.05 -word_size 28 -dust yes -soft_masking true -outfmt 7
batch-len = 100000
mem-limit = 4G


[timeouts]
init-pv = 30
