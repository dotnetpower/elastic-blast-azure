[cloud-provider]
azure-region = koreacentral
azure-acr-resource-group = rg-elbacr
azure-acr-name = elbacr
azure-resource-group = rg-elb-koc
azure-storage-account = stgelb
azure-storage-account-container = blast-db

# B3-idx-E64-1N: Full core_nt with MegaBLAST index, E64s single node
# Axis B3 — MegaBLAST Indexing
# Uses pre-built makembindex word-lookup index for faster seeding.
# NOTE: -use_index is in ElasticBLAST's UNSUPPORTED_OPTIONS list.
#       This test uses a custom blast-run script that adds -use_index.
#       See: benchmark/scripts/blast-run-indexed-aks.sh

[cluster]
name = elb-v3-b3
machine-type = Standard_E64s_v3
num-nodes = 1
exp-use-local-ssd = true

[blast]
program = blastn
db = https://stgelb.blob.core.windows.net/blast-db/core_nt_indexed/core_nt
queries = https://stgelb.blob.core.windows.net/queries/pathogen-10.fa
results = https://stgelb.blob.core.windows.net/results/v3/b3_index/B3-idx-E64-1N
options = -max_target_seqs 500 -evalue 0.05 -word_size 28 -dust yes -soft_masking true -outfmt 7 -use_index true -index_name core_nt
batch-len = 100000
mem-limit = 4G

[timeouts]
init-pv = 60
