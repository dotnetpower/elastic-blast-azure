[cloud-provider]
azure-region = koreacentral
azure-acr-resource-group = rg-elbacr
azure-acr-name = elbacr
azure-resource-group = rg-elb-koc
azure-storage-account = stgelb
azure-storage-account-container = blast-db

# REF-E64-1N: v2 baseline reproduction for v3 comparison
# Full core_nt (269 GB), E64s_v3 single node, 10 queries
# Expected: ~57 min BLAST time (matches v2 A1-E64-10)

[cluster]
name = elb-v3-ref
machine-type = Standard_E64s_v3
num-nodes = 1
exp-use-local-ssd = true

[blast]
program = blastn
db = https://stgelb.blob.core.windows.net/blast-db/core_nt/core_nt
queries = https://stgelb.blob.core.windows.net/queries/pathogen-10.fa
results = https://stgelb.blob.core.windows.net/results/v3/reference/REF-E64-1N
options = -max_target_seqs 500 -evalue 0.05 -word_size 28 -dust yes -soft_masking true -outfmt 7
batch-len = 100000
mem-limit = 4G

[timeouts]
init-pv = 90
