[cloud-provider]
azure-region = koreacentral
azure-acr-resource-group = rg-elbacr
azure-acr-name = elbacr
azure-resource-group = rg-elb-koc
azure-storage-account = stgelb
azure-storage-account-container = blast-db

# B1-S10-elb: 10-shard DB partitioning via ElasticBLAST
# Each node downloads one shard (~27 GB) from blob, runs BLAST with -dbsize correction.
# Uses db-partitions config to enable shard mode.

[cluster]
name = elb-v3-b1s10
machine-type = Standard_E16s_v3
num-nodes = 10
exp-use-local-ssd = true

[blast]
program = blastn
db = https://stgelb.blob.core.windows.net/blast-db/core_nt/core_nt
queries = https://stgelb.blob.core.windows.net/queries/pathogen-10.fa
results = https://stgelb.blob.core.windows.net/results/v3/b1_shard/B1-S10-elb
options = -max_target_seqs 500 -evalue 0.05 -word_size 28 -dust yes -soft_masking true -outfmt 7 -dbsize 978954058562
batch-len = 100000
mem-limit = 100G
mem-request = 80G
db-partitions = 10
db-partition-prefix = https://stgelb.blob.core.windows.net/blast-db/10shards/core_nt_shard_

[timeouts]
init-pv = 30
blast-k8s-job = 60
